<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discrete Lorenz Attractor Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 1rem;
            overflow-x: hidden;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 0.75rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            background-color: #000;
            width: 100%;
            height: 65vh;
            max-width: 900px;
        }
        .control-panel {
            background-color: #1e293b;
            padding: 1.5rem;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 1.5rem;
            width: 100%;
            max-width: 900px;
            border: 1px solid #334155;
        }
        input[type="number"] {
            background-color: #334155;
            border: 1px solid #475569;
            color: #f8fafc;
            padding: 0.5rem;
            border-radius: 0.5rem;
        }
        .message-box {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(30, 41, 59, 0.9);
            color: #818cf8;
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 1000;
            display: none;
            border: 1px solid #4f46e5;
        }
    </style>
</head>
<body>
    <div id="message-box" class="message-box"></div>

    <div class="control-panel">
        <h1 class="text-3xl font-bold text-center text-indigo-400 mb-2">Discrete Lorenz Explorer</h1>
        <p class="text-center text-gray-400 mb-6 text-sm">
            Visualizing the 3D Sinusoidal Map. Use mouse to rotate and zoom.
        </p>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="flex flex-col">
                <label class="text-gray-400 text-xs font-bold mb-1">Parameter a:</label>
                <input type="number" id="paramA" value="0.015" step="0.001">
            </div>
            <div class="flex flex-col">
                <label class="text-gray-400 text-xs font-bold mb-1">Parameter b:</label>
                <input type="number" id="paramB" value="0.79" step="0.01">
            </div>
            <div class="flex flex-col">
                <label class="text-gray-400 text-xs font-bold mb-1">Parameter c:</label>
                <input type="number" id="paramC" value="0.9" step="0.01">
            </div>
            <div class="flex flex-col">
                <label class="text-gray-400 text-xs font-bold mb-1">Iterations:</label>
                <input type="number" id="iterCount" value="20000" step="1000">
            </div>
        </div>

        <div class="flex gap-4">
            <button id="generateBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-lg font-bold transition-all">
                Generate Attractor
            </button>
            <button id="clearBtn" class="px-6 bg-slate-700 hover:bg-slate-600 text-white rounded-lg font-bold transition-all">
                Clear
            </button>
        </div>
    </div>

    <canvas id="lorenzCanvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        let scene, camera, renderer, controls, attractorLine;

        // --- Math Engine: 3D Sinusoidal Map ---
        const generateLorenzPath = (a, b, c, iterations) => {
            let x = 0.1, y = 0.1, z = 0.1;
            const points = [];
            const colors = [];
            const colorStart = new THREE.Color(0x6366f1); // Indigo
            const colorEnd = new THREE.Color(0x22d3ee);   // Cyan

            for (let i = 0; i < iterations; i++) {
                let nextX = y;
                let nextY = Math.sin(z);
                let nextZ = a + (b * x) + (c * y) - Math.sin(z * z);

                x = nextX;
                y = nextY;
                z = nextZ;

                // Scale for visibility
                points.push(new THREE.Vector3(x * 25, y * 25, z * 25));
                
                // Temporal color gradient
                const lerpFactor = i / iterations;
                const vertexColor = new THREE.Color().copy(colorStart).lerp(colorEnd, lerpFactor);
                colors.push(vertexColor.r, vertexColor.g, vertexColor.b);
            }
            return { points, colors };
        };

        function initThreeJS() {
            const canvas = document.getElementById('lorenzCanvas');
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(75, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
            camera.position.set(20, 20, 40);

            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const axesHelper = new THREE.AxesHelper(5);
            scene.add(axesHelper);

            window.addEventListener('resize', () => {
                const w = canvas.parentElement.clientWidth;
                const h = window.innerHeight * 0.65;
                renderer.setSize(w, h);
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
            });
        }

        function clearScene() {
            if (attractorLine) {
                scene.remove(attractorLine);
                attractorLine.geometry.dispose();
                attractorLine.material.dispose();
                attractorLine = null;
            }
        }

        function showMessage(msg) {
            const box = document.getElementById('message-box');
            box.textContent = msg;
            box.style.display = 'block';
            setTimeout(() => box.style.display = 'none', 3000);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        document.addEventListener('DOMContentLoaded', () => {
            initThreeJS();
            animate();

            const genBtn = document.getElementById('generateBtn');
            const clrBtn = document.getElementById('clearBtn');

            genBtn.addEventListener('click', () => {
                const a = parseFloat(document.getElementById('paramA').value);
                const b = parseFloat(document.getElementById('paramB').value);
                const c = parseFloat(document.getElementById('paramC').value);
                const iters = parseInt(document.getElementById('iterCount').value);

                clearScene();

                const data = generateLorenzPath(a, b, c, iters);
                
                const geometry = new THREE.BufferGeometry().setFromPoints(data.points);
                geometry.setAttribute('color', new THREE.Float32BufferAttribute(data.colors, 3));

                const material = new THREE.LineBasicMaterial({ 
                    vertexColors: true,
                    transparent: true,
                    opacity: 0.8
                });

                attractorLine = new THREE.Line(geometry, material);
                scene.add(attractorLine);
                
                showMessage("Attractor Rendered");
            });

            clrBtn.addEventListener('click', () => {
                clearScene();
                showMessage("Scene Cleared");
            });
        });
    </script>
</body>
</html>
